---
name: Build
run-name: "Build ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 2.0.0)'
        required: false
        default: 'latest'
  schedule:
    - cron: '0 4 * * *'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ha_opencode

jobs:
  build:
    name: Build ${{ matrix.ha_arch }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - ha_arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - ha_arch: aarch64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="latest"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.ha_arch }} image
        uses: docker/build-push-action@v7
        with:
          context: ha_opencode
          file: ha_opencode/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ matrix.ha_arch }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ matrix.ha_arch }}:latest
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/base-debian:trixie
            BUILD_VERSION=${{ steps.version.outputs.version }}
            BUILD_ARCH=${{ matrix.ha_arch }}
          cache-from: type=gha,scope=${{ env.IMAGE_NAME }}-${{ matrix.ha_arch }}
          cache-to: type=gha,mode=max,scope=${{ env.IMAGE_NAME }}-${{ matrix.ha_arch }}
          labels: |
            io.hass.arch=${{ matrix.ha_arch }}
            io.hass.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.title=OpenCode
            org.opencontainers.image.description=AI coding agent for Home Assistant
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=Unlicense

  manifest:
    name: Publish multi-arch manifest
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Get version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="latest"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        shell: bash
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE}:${VERSION}" \
            --tag "${IMAGE}:latest" \
            "${IMAGE}/amd64:${VERSION}" \
            "${IMAGE}/aarch64:${VERSION}"

      - name: Inspect multi-arch manifest
        shell: bash
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          VERSION: ${{ steps.version.outputs.version }}
        run: docker buildx imagetools inspect "${IMAGE}:${VERSION}"

      - name: Write release image assets
        if: github.event_name == 'push'
        shell: bash
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          docker buildx imagetools inspect "${IMAGE}:${VERSION}" > image-manifest.txt
          {
            echo "# Container images"
            echo
            echo "Published from ${GITHUB_REPOSITORY}@${GITHUB_SHA}."
            echo
            echo "| Purpose | Image |"
            echo "|---------|-------|"
            echo "| Multi-arch version tag | \`${IMAGE}:${VERSION}\` |"
            echo "| Multi-arch latest tag | \`${IMAGE}:latest\` |"
            echo "| Legacy amd64 alias | \`${IMAGE}/amd64:${VERSION}\` |"
            echo "| Legacy aarch64 alias | \`${IMAGE}/aarch64:${VERSION}\` |"
            echo
            echo "## Manifest"
            echo
            echo '```text'
            cat image-manifest.txt
            echo '```'
          } > container-images.md

      - name: Upload image assets to GitHub Release
        if: github.event_name == 'push'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          for attempt in {1..30}; do
            if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
              gh release upload "${RELEASE_TAG}" \
                --repo "${GITHUB_REPOSITORY}" \
                container-images.md \
                image-manifest.txt \
                --clobber
              exit 0
            fi
            sleep 5
          done

          echo "::error::GitHub Release ${RELEASE_TAG} was not found"
          exit 1
